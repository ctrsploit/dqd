    image: ghcr.io/ctrsploit/kubernetes-v1.33.4_containerd-v2.1.4_init:v0.1.0
    environment:
      - "QEMU_NET=10.0.2.0/24"
      - "QEMU_DHCPSTART=10.0.2.16"
      - "QEMU_HOSTFWD=hostfwd=tcp::6443-:6443"
