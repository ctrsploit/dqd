services:
  vm:
    image: ghcr.io/ctrsploit/kubernetes-v1.18.2_containerd-v1.3.3_init:v0.1.0
    environment:
      - "QEMU_NET=10.0.2.0/24"
      - "QEMU_DHCPSTART=10.0.2.16"
      - "QEMU_HOSTFWD=hostfwd=tcp::6443-:6443"
    ports:
        - "11820:22"
        - "11821:6443"
    tty: true
    stdin_open: true
