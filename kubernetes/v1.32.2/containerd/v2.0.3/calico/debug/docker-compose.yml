    image: ghcr.io/ctrsploit/kubernetes-v1.32.2_containerd-v2.0.3_calico_debug:v0.2.0
    environment:
      - "QEMU_NET=10.0.2.0/24"
      - "QEMU_DHCPSTART=10.0.2.16"
      - "QEMU_HOSTFWD=hostfwd=tcp::6443-:6443,hostfwd=tcp::2345-:2345,hostfwd=tcp::2346-:2346"
    ports:
        - "13227:22"
        - "13228:6443"
        - "13229:2345"
        - "23220:2346"
