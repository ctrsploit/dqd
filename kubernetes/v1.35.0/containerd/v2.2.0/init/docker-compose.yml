services:
  vm:
    image: ghcr.io/ctrsploit/kubernetes-v1.35.0_containerd-v2.2.0_init:v0.1.0
    environment:
      - "QEMU_NET=10.0.2.0/24"
      - "QEMU_DHCPSTART=10.0.2.16"
      - "QEMU_HOSTFWD=hostfwd=tcp::6443-:6443"
    ports:
        - "13500:22"
        - "13501:6443"
    tty: true
    stdin_open: true
